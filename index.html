<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>BAOSTARS 장비 렌탈 계산기</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Apple SD Gothic Neo','Malgun Gothic','맑은 고딕',sans-serif;background:#0d1b2a;min-height:100vh;color:#e0eaf5}
.header{background:#0a1628;padding:20px 24px;border-bottom:1px solid #1e3a5f;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:100}
.logo{color:#4a9eff;font-size:20px;font-weight:600;letter-spacing:3px}
.sub{color:#8ba4c0;font-size:12px;margin-top:3px}
.container{display:flex;max-width:1100px;margin:0 auto;padding:24px 16px;gap:20px}
.left-panel{flex:1;min-width:0}
.right-panel{width:300px;flex-shrink:0}
.search-bar{display:flex;gap:8px;margin-bottom:14px}
.search-bar input{flex:1;height:40px;border:1px solid #1e3a5f;border-radius:8px;padding:0 14px;font-size:14px;background:#0a1628;color:#e0eaf5;outline:none}
.search-bar input:focus{border-color:#4a9eff}
.search-bar input::placeholder{color:#4a6080}
.cat-filter{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:14px}
.cat-btn{padding:5px 12px;border-radius:20px;border:1px solid #1e3a5f;font-size:12px;cursor:pointer;background:transparent;color:#8ba4c0;transition:all .15s}
.cat-btn.active{background:#1e3a5f;color:#4a9eff;border-color:#4a9eff}
.cat-btn:hover{border-color:#4a9eff;color:#4a9eff}
.table-wrap{background:#0a1628;border-radius:10px;border:1px solid #1e3a5f;overflow:hidden}
.eq-table{width:100%;border-collapse:collapse}
.eq-table th{padding:10px 12px;font-size:11px;font-weight:500;color:#8ba4c0;text-align:left;background:#071020;border-bottom:1px solid #1e3a5f}
.eq-table th.price-h{text-align:right}
.eq-table td{padding:9px 12px;font-size:13px;border-bottom:0.5px solid #12253d;color:#c8d8e8;vertical-align:middle}
.eq-table tr:hover td{background:#0f2035}
.eq-table tr.checked td{background:#0d2240}
.cat-row td{padding:6px 12px;font-size:10px;font-weight:600;color:#4a9eff;background:#071020;letter-spacing:1.5px;text-transform:uppercase;border-bottom:0.5px solid #1e3a5f}
.price-td{text-align:right;font-weight:500;color:#4a9eff;font-variant-numeric:tabular-nums;white-space:nowrap}
.check-td{width:36px;text-align:center}
.check-td input{width:17px;height:17px;accent-color:#4a9eff;cursor:pointer}
.qty-input{width:44px;height:28px;border:1px solid #1e3a5f;border-radius:5px;text-align:center;font-size:13px;background:#071020;color:#c8d8e8;outline:none}
.qty-input:focus{border-color:#4a9eff}
.model-name{font-weight:500;color:#e0eaf5;font-size:13px}
.model-desc{font-size:11px;color:#4a7090;margin-top:2px}
.no-result{padding:40px;text-align:center;color:#4a6080;font-size:13px}
.summary-card{background:#0a1628;border:1px solid #1e3a5f;border-radius:10px;overflow:hidden;position:sticky;top:90px}
.summary-header{background:#071020;padding:14px 16px;border-bottom:1px solid #1e3a5f}
.summary-title{color:#4a9eff;font-size:11px;letter-spacing:1.5px;text-transform:uppercase;font-weight:600}
.summary-items{padding:12px 16px;min-height:120px;max-height:280px;overflow-y:auto}
.summary-item{display:flex;justify-content:space-between;align-items:center;font-size:12px;color:#8ba4c0;padding:5px 0;border-bottom:0.5px solid #12253d}
.summary-item:last-child{border-bottom:none}
.summary-item-name{flex:1;margin-right:8px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.summary-item-price{color:#4a9eff;font-weight:500;white-space:nowrap;font-variant-numeric:tabular-nums;margin-right:8px}
.summary-item-del{background:transparent;border:none;color:#2a4060;cursor:pointer;font-size:15px;line-height:1;padding:0 2px;flex-shrink:0;transition:color .15s}
.summary-item-del:hover{color:#e24b4a}
.summary-empty{color:#2a4060;font-size:12px;font-style:italic;text-align:center;padding:20px 0}
.summary-footer{padding:14px 16px;border-top:1px solid #1e3a5f;background:#071020}
.total-row{display:flex;justify-content:space-between;align-items:center;margin-bottom:6px}
.total-label{font-size:12px;color:#8ba4c0}
.total-price{font-size:24px;font-weight:600;color:#4a9eff;font-variant-numeric:tabular-nums}
.vat-row{font-size:11px;color:#4a6080;text-align:right;margin-bottom:12px}
.days-row{display:flex;align-items:center;gap:8px;margin-bottom:10px;font-size:12px;color:#8ba4c0}
.days-row input{width:44px;height:28px;border:1px solid #1e3a5f;border-radius:5px;text-align:center;font-size:13px;background:#0a1628;color:#4a9eff;font-weight:600;outline:none;font-family:inherit}
.days-row input:focus{border-color:#4a9eff}
.count-badge{display:inline-block;background:#1e3a5f;color:#4a9eff;border-radius:20px;padding:2px 8px;font-size:11px;font-weight:600;margin-left:4px}
.btn-group{display:flex;flex-direction:column;gap:8px}
.clear-btn{width:100%;padding:9px;background:transparent;border:1px solid #1e3a5f;color:#8ba4c0;border-radius:7px;font-size:12px;cursor:pointer;transition:all .15s;font-family:inherit}
.clear-btn:hover{border-color:#4a9eff;color:#4a9eff}
.pdf-btn{width:100%;padding:10px;background:#185fa5;border:none;color:#fff;border-radius:7px;font-size:13px;font-weight:600;cursor:pointer;transition:all .15s;font-family:inherit;letter-spacing:0.5px}
.pdf-btn:hover{background:#1e7ac8}
.pdf-btn:disabled{background:#1e3a5f;color:#4a6080;cursor:not-allowed}
.footer-note{text-align:center;padding:16px;font-size:11px;color:#2a4060}
.loading{text-align:center;padding:60px 20px;color:#4a6080}
.loading-spinner{display:inline-block;width:24px;height:24px;border:3px solid #1e3a5f;border-top-color:#4a9eff;border-radius:50%;animation:spin .8s linear infinite;margin-bottom:12px}
@keyframes spin{to{transform:rotate(360deg)}}
.sync-info{font-size:10px;color:#2a4060;text-align:right;margin-bottom:8px}

.modal-bg{display:none;position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,0.7);z-index:999;align-items:center;justify-content:center}
.modal-bg.show{display:flex}
.modal{background:#0a1628;border:1px solid #1e3a5f;border-radius:12px;padding:28px;width:380px;max-width:90vw}
.modal h3{color:#4a9eff;font-size:15px;font-weight:600;margin-bottom:20px;letter-spacing:1px}
.modal-field{margin-bottom:14px}
.modal-field label{display:block;font-size:12px;color:#8ba4c0;margin-bottom:5px}
.modal-field input{width:100%;height:38px;border:1px solid #1e3a5f;border-radius:7px;padding:0 12px;font-size:13px;background:#071020;color:#e0eaf5;outline:none;font-family:inherit}
.modal-field input:focus{border-color:#4a9eff}
.modal-field input::placeholder{color:#4a6080}
.modal-actions{display:flex;gap:10px;margin-top:20px}
.modal-cancel{flex:1;padding:10px;background:transparent;border:1px solid #1e3a5f;color:#8ba4c0;border-radius:7px;font-size:13px;cursor:pointer;font-family:inherit}
.modal-cancel:hover{border-color:#4a9eff;color:#4a9eff}
.modal-confirm{flex:2;padding:10px;background:#185fa5;border:none;color:#fff;border-radius:7px;font-size:13px;font-weight:600;cursor:pointer;font-family:inherit}
.modal-confirm:hover{background:#1e7ac8}

@media(max-width:700px){
  .container{flex-direction:column}
  .right-panel{width:100%}
  .summary-card{position:static}
}
</style>
</head>
<body>

<div class="header">
  <div>
    <div class="logo">BAOSTARS</div>
    <div class="sub">촬영 장비 렌탈 단가 계산기</div>
  </div>
</div>

<div class="modal-bg" id="modalBg">
  <div class="modal">
    <h3>📋 견적서 정보 입력</h3>
    <div class="modal-field">
      <label>고객사명</label>
      <input type="text" id="clientName" placeholder="예) ㈜ABC 마케팅">
    </div>
    <div class="modal-field">
      <label>담당자명</label>
      <input type="text" id="clientManager" placeholder="예) 김철수 대리">
    </div>
    <div class="modal-field">
      <label>연락처</label>
      <input type="text" id="clientContact" placeholder="예) 010-1234-5678 / email@company.com">
    </div>
    <div class="modal-field">
      <label>프로젝트명</label>
      <input type="text" id="projectName" placeholder="예) 2026 브랜드 홍보영상 촬영">
    </div>
    <div class="modal-field">
      <label>대여 날짜 · 시간 <span id="daysDisplay" style="color:#4a9eff;font-weight:600;margin-left:8px"></span></label>
      <div style="display:flex;gap:6px">
        <input type="date" id="rentDate" onchange="calcDays()" style="flex:1;height:36px;border:1px solid #1e3a5f;border-radius:6px;padding:0 10px;background:#071020;color:#e0eaf5;font-family:inherit;font-size:13px">
        <input type="time" id="rentTime" onchange="calcDays()" value="09:00" style="width:90px;height:36px;border:1px solid #1e3a5f;border-radius:6px;padding:0 8px;background:#071020;color:#e0eaf5;font-family:inherit;font-size:13px">
      </div>
    </div>
    <div class="modal-field">
      <label>반납 날짜 · 시간</label>
      <div style="display:flex;gap:6px">
        <input type="date" id="returnDate" onchange="calcDays()" style="flex:1;height:36px;border:1px solid #1e3a5f;border-radius:6px;padding:0 10px;background:#071020;color:#e0eaf5;font-family:inherit;font-size:13px">
        <input type="time" id="returnTime" onchange="calcDays()" value="18:00" style="width:90px;height:36px;border:1px solid #1e3a5f;border-radius:6px;padding:0 8px;background:#071020;color:#e0eaf5;font-family:inherit;font-size:13px">
      </div>
    </div>
    <div class="modal-actions">
      <button class="modal-cancel" onclick="closeModal()">취소</button>
      <button class="modal-confirm" onclick="doPrint()">견적서 출력</button>
    </div>
  </div>
</div>

<div class="container">
  <div class="left-panel">
    <div class="search-bar">
      <input type="text" id="searchInput" placeholder="장비명 검색... (예: FX6, 짐벌, 드론, 조명)" oninput="filterEquipment()">
    </div>
    <div class="cat-filter" id="catFilter"></div>
    <div id="syncInfo" class="sync-info"></div>
    <div class="table-wrap">
      <table class="eq-table">
        <thead>
          <tr>
            <th class="check-td">선택</th>
            <th>모델명 / 용도</th>
            <th style="width:40px">보유</th>
            <th style="width:52px">수량</th>
            <th class="price-h" style="width:110px">단가(1일)</th>
          </tr>
        </thead>
        <tbody id="eqBody"></tbody>
      </table>
      <div id="loadingMsg" class="loading">
        <div class="loading-spinner"></div><br>
        구글 시트에서 장비 데이터를 불러오는 중...
      </div>
      <div id="noResult" class="no-result" style="display:none">검색 결과가 없습니다.</div>
    </div>
    <div class="footer-note">※ 본 단가는 시장 참고가이며 실제 협의에 따라 조정될 수 있습니다. | © BAOSTARS · baostars@naver.com</div>
  </div>

  <div class="right-panel">
    <div class="summary-card">
      <div class="summary-header">
        <div class="summary-title">선택 장비 목록 <span class="count-badge" id="countBadge">0</span></div>
      </div>
      <div class="summary-items" id="summaryItems">
        <div class="summary-empty">장비를 선택하면<br>여기에 표시됩니다.</div>
      </div>
      <div class="summary-footer">
        <div class="days-row">
          <span>대여 일수</span>
          <input type="number" id="daysInput" min="1" max="30" value="1" onchange="updateSummary()">
          <span>일</span>
        </div>
        <div class="total-row">
          <span class="total-label">합계 (VAT 별도)</span>
          <span class="total-price" id="summaryTotal">₩0</span>
        </div>
        <div class="vat-row" id="summaryVat">VAT 10% 포함: ₩0</div>
        <div class="btn-group">
          <button class="pdf-btn" id="pdfBtn" onclick="openModal()" disabled>📄 견적서 PDF 다운로드</button>
          <button class="clear-btn" onclick="clearAll()">전체 선택 해제</button>
        </div>
      </div>
    </div>
  </div>
</div>

<script>
/*
 * ═══════════════════════════════════════════════════
 * 구글 시트 연동 설정
 * 시트에서 장비를 추가/삭제/수정하면 페이지 새로고침 시 자동 반영
 * ═══════════════════════════════════════════════════
 */
const SHEET_ID='1tMefAqqwir3oqk1UHNtIptNFpzQzsRpMKT8lzLjrEoI';
const SHEET_NAME='보유장비목록';
const SHEET_URL=`https://docs.google.com/spreadsheets/d/${SHEET_ID}/gviz/tq?tqx=out:json&sheet=${encodeURIComponent(SHEET_NAME)}`;

const catDisplayMap={
  'Audio':'Audio · 오디오',
  'Camera':'Camera · 시네마/사진',
  'Action Cam':'Action · 액션/360',
  'Drone':'Drone · 드론',
  'Lens':'Lens · 렌즈',
  'Lighting':'Lighting · 조명',
  'Monitor':'Monitor · 모니터',
  'Wireless':'Wireless · 무선',
  'Filter':'Filter · 필터',
  'MatteBox':'MatteBox · 매트박스',
  'Gimbal':'Gimbal · 짐벌',
  'Slider':'Slider · 슬라이더',
  'Tripod':'Tripod · 삼각대',
  'Stand':'Stand · 스탠드'
};

const catGroupOrder=[
  'Audio','Camera','Action Cam','Drone','Lens','Lighting',
  'Monitor','Wireless','Filter','MatteBox','Gimbal','Slider','Tripod','Stand'
];

let data=[];
let activeCat='전체';
let searchText='';
let selected={};
let customQty={};

async function fetchSheetData(){
  try{
    const res=await fetch(SHEET_URL);
    const text=await res.text();
    const jsonStr=text.match(/google\.visualization\.Query\.setResponse\(([\s\S]+)\);?/);
    if(!jsonStr)throw new Error('시트 응답 파싱 실패');
    const json=JSON.parse(jsonStr[1]);
    const rows=json.table.rows;
    data=[];
    for(let r=0;r<rows.length;r++){
      const cells=rows[r].c;
      const cat=cells[1]?(cells[1].v||'').trim():'';
      if(!cat)continue;
      const model=cells[2]?(cells[2].v||'').trim():'';
      if(!model)continue;
      const desc=cells[3]?(cells[3].v||'').trim():'';
      const stock=cells[4]?(parseInt(cells[4].v)||0):0;
      let price=0;
      if(cells[5]){
        const pv=cells[5].v;
        if(typeof pv==='number')price=pv;
        else if(typeof pv==='string')price=parseInt(pv.replace(/[₩,\s]/g,''))||0;
      }
      const ref=cells[6]?(cells[6].v||'').trim():'';
      const status=cells[8]?(cells[8].v||'').trim():'보유중';
      data.push({cat,model,desc,stock,price,ref,status});
    }
    document.getElementById('loadingMsg').style.display='none';
    const now=new Date();
    document.getElementById('syncInfo').textContent=
      `🔄 마지막 동기화: ${now.toLocaleString('ko-KR')} · 총 ${data.length}개 장비`;
    initCatFilter();
    renderTable();
  }catch(err){
    console.error('시트 로딩 오류:',err);
    document.getElementById('loadingMsg').innerHTML=
      `<div style="color:#f87171">⚠️ 데이터를 불러오지 못했습니다.<br><small>${err.message}</small><br><br><button onclick="fetchSheetData()" style="padding:8px 16px;background:#185fa5;color:#fff;border:none;border-radius:6px;cursor:pointer;font-family:inherit">다시 시도</button></div>`;
  }
}

function initCatFilter(){
  const cf=document.getElementById('catFilter');
  cf.innerHTML='';
  const existingCats=[];
  catGroupOrder.forEach(c=>{if(data.some(d=>d.cat===c))existingCats.push(c);});
  data.forEach(d=>{if(!existingCats.includes(d.cat))existingCats.push(d.cat);});
  const cats=['전체',...existingCats];
  cats.forEach(c=>{
    const b=document.createElement('button');
    b.className='cat-btn'+(c===activeCat?' active':'');
    b.textContent=c==='전체'?'전체 보기':(catDisplayMap[c]||c);
    b.onclick=()=>{
      activeCat=c;
      document.querySelectorAll('.cat-btn').forEach(x=>x.classList.remove('active'));
      b.classList.add('active');
      renderTable();
    };
    cf.appendChild(b);
  });
}

function fmt(n){return'₩'+n.toLocaleString('ko-KR')}

function renderTable(){
  const body=document.getElementById('eqBody');
  const noRes=document.getElementById('noResult');
  body.innerHTML='';
  const q=searchText.toLowerCase();
  let prevCat='';
  let count=0;
  data.forEach((item,i)=>{
    if(activeCat!=='전체'&&item.cat!==activeCat)return;
    if(q&&!item.model.toLowerCase().includes(q)&&!item.desc.toLowerCase().includes(q)&&!item.cat.toLowerCase().includes(q))return;
    count++;
    if(item.cat!==prevCat){
      const cr=document.createElement('tr');
      cr.classList.add('cat-row');
      cr.innerHTML=`<td colspan="5">${catDisplayMap[item.cat]||item.cat}</td>`;
      body.appendChild(cr);
      prevCat=item.cat;
    }
    const isChecked=!!selected[i];
    const tr=document.createElement('tr');
    if(isChecked)tr.classList.add('checked');
    tr.innerHTML=`
      <td class="check-td"><input type="checkbox" ${isChecked?'checked':''} onchange="toggle(${i},this)"></td>
      <td><div class="model-name">${item.model}</div><div class="model-desc">${item.desc}</div></td>
      <td style="text-align:center;font-size:12px;color:#8ba4c0">${item.stock}</td>
      <td><input class="qty-input" type="number" min="1" max="${item.stock||99}" value="${customQty[i]||1}" onchange="setQty(${i},this)"></td>
      <td class="price-td">${fmt(item.price)}</td>
    `;
    body.appendChild(tr);
  });
  noRes.style.display=count===0?'block':'none';
  updateSummary();
}

function toggle(i,el){
  if(el.checked){selected[i]=true;if(!customQty[i])customQty[i]=1;}
  else{delete selected[i];}
  renderTable();
}

function setQty(i,el){
  const max=data[i].stock||99;
  const v=Math.min(max,Math.max(1,parseInt(el.value)||1));
  el.value=v;customQty[i]=v;selected[i]=true;
  updateSummary();
}

function updateSummary(){
  const si=document.getElementById('summaryItems');
  const st=document.getElementById('summaryTotal');
  const sv=document.getElementById('summaryVat');
  const cb=document.getElementById('countBadge');
  const pb=document.getElementById('pdfBtn');
  const rd=document.getElementById('rentDate').value;
  const rt=document.getElementById('rentTime').value;
  const rod=document.getElementById('returnDate').value;
  const rot=document.getElementById('returnTime').value;
  let days;
  if(rd&&rod){
    const ms=new Date(rod+' '+rot)-new Date(rd+' '+rt);
    days=Math.max(1,Math.ceil(ms/(1000*60*60*24)));
  }else{
    days=Math.max(1,parseInt(document.getElementById('daysInput').value)||1);
  }
  const keys=Object.keys(selected).map(Number).filter(k=>selected[k]);
  cb.textContent=keys.length;
  pb.disabled=keys.length===0;
  if(keys.length===0){
    si.innerHTML='<div class="summary-empty">장비를 선택하면<br>여기에 표시됩니다.</div>';
    st.textContent='₩0';sv.textContent='VAT 10% 포함: ₩0';return;
  }
  let total=0;si.innerHTML='';
  keys.forEach(k=>{
    const item=data[k];const q=customQty[k]||1;const sub=item.price*q*days;total+=sub;
    const div=document.createElement('div');div.className='summary-item';
    div.innerHTML=`<span class="summary-item-name">${item.model}${q>1?' ×'+q:''}</span><span class="summary-item-price">${fmt(sub)}</span><button class="summary-item-del" onclick="deselect(${k})" title="선택 해제">✕</button>`;
    si.appendChild(div);
  });
  st.textContent=fmt(total);
  sv.textContent=`VAT 10% 포함: ${fmt(Math.round(total*1.1))}`;
}

function deselect(i){delete selected[i];delete customQty[i];renderTable();}
function filterEquipment(){searchText=document.getElementById('searchInput').value;renderTable();}
function clearAll(){selected={};customQty={};renderTable();}

function calcDays(){
  const rd=document.getElementById('rentDate');
  const rt=document.getElementById('rentTime');
  const rod=document.getElementById('returnDate');
  const rot=document.getElementById('returnTime');
  if(!rd||!rod)return;
  if(rd.value&&rod.value){
    const ms=new Date(rod.value+' '+(rot.value||'18:00'))-new Date(rd.value+' '+(rt.value||'09:00'));
    const d=Math.max(1,Math.ceil(ms/(1000*60*60*24)));
    document.getElementById('daysInput').value=d;
    updateSummary();
    const di=document.getElementById('daysDisplay');
    if(di)di.textContent=d+'일';
  }
}

function openModal(){
  document.getElementById('modalBg').classList.add('show');
  document.getElementById('clientName').focus();
}
function closeModal(){document.getElementById('modalBg').classList.remove('show');}

function doPrint(){
  const client=document.getElementById('clientName').value||'';
  const manager=document.getElementById('clientManager').value||'';
  const contact=document.getElementById('clientContact').value||'';
  const project=document.getElementById('projectName').value||'장비 렌탈 견적';
  const rentDate=document.getElementById('rentDate').value||'';
  const rentTime=document.getElementById('rentTime').value||'';
  const returnDate=document.getElementById('returnDate').value||'';
  const returnTime=document.getElementById('returnTime').value||'';
  function fmtDate(d,t){if(!d)return '';const[y,m,day]=d.split('-');return`${y}.${m}.${day}${t?' '+t:''}`;}
  const rentStr=fmtDate(rentDate,rentTime);
  const returnStr=fmtDate(returnDate,returnTime);
  const today=new Date();
  const todayStr=`${today.getFullYear()}.${String(today.getMonth()+1).padStart(2,'0')}.${String(today.getDate()).padStart(2,'0')}`;
  let days;
  if(rentDate&&returnDate){
    const ms=new Date(returnDate+' '+returnTime)-new Date(rentDate+' '+rentTime);
    days=Math.max(1,Math.ceil(ms/(1000*60*60*24)));
  }else{
    days=Math.max(1,parseInt(document.getElementById('daysInput').value)||1);
  }
  const keys=Object.keys(selected).map(Number).filter(k=>selected[k]);
  let total=0;
  const rows=keys.map(k=>{
    const item=data[k];const q=customQty[k]||1;const sub=item.price*q*days;total+=sub;
    return`<tr><td>${item.model}</td><td>${item.desc}</td><td style="text-align:center">${q}${q>1?' ea':''}</td><td style="text-align:right">₩${item.price.toLocaleString()}</td><td style="text-align:right;color:#185fa5;font-weight:600">₩${sub.toLocaleString()}</td></tr>`;

  const clientLine=`${client}${manager?' · '+manager:''}`;
  const vat=Math.round(total*1.1);
  const html=`<!DOCTYPE html><html lang="ko"><head><meta charset="UTF-8">
<style>

  .info{font-size:11px;color:#666;margin-top:4px;line-height:1.8}

  .meta{margin-bottom:16px}
  .meta-row{display:flex;gap:24px;font-size:12px;margin-bottom:4px}

  td{padding:7px 10px;border-bottom:0.5px solid #e0e0e0;font-size:12px}
  tr:nth-child(even) td{background:#f7f9fc}
  .total-box{background:#f0f5ff;border:1px solid #b5d4f4;border-radius:8px;padding:14px 18px;text-align:right}
  .total-label{font-size:12px;color:#666;margin-bottom:4px}
  .total-price{font-size:22px;font-weight:700;color:#185fa5}
  .vat{font-size:11px;color:#888;margin-top:4px}
  .footer{margin-top:24px;font-size:10px;color:#aaa;text-align:center;border-top:1px solid #eee;padding-top:12px}
</style></head><body>
  <div class="logo">BAOSTARS</div>
  <div class="info">부산광역시 사하구 하신번영로 312번길 63, 801호 | baostars@naver.com | 010-2871-1397<br>사업자등록번호: 760-01-01001</div>
  <hr class="divider">
  <div class="meta">
    ${clientLine?`<div class="meta-row"><span class="meta-label">수신</span><span class="meta-val">${clientLine}</span></div>`:''}
    ${contact?`<div class="meta-row"><span class="meta-label">연락처</span><span class="meta-val">${contact}</span></div>`:''}
    ${rentStr?`<div class="meta-row"><span class="meta-label">대여 일시</span><span class="meta-val">${rentStr}</span></div>`:''}
    ${returnStr?`<div class="meta-row"><span class="meta-label">반납 일시</span><span class="meta-val">${returnStr}</span></div>`:''}
    <div class="meta-row"><span class="meta-label">견적일</span><span class="meta-val">${todayStr}</span></div>
    <div class="meta-row"><span class="meta-label">대여 일수</span><span class="meta-val">${days}일</span></div>
    <div class="meta-row"><span class="meta-label">유효기간</span><span class="meta-val">견적일로부터 30일</span></div>
  </div>
  <h2>${project} — 장비 렌탈 견적서</h2>
  <table>
    <thead><tr><th>모델명</th><th>용도</th><th style="text-align:center">수량</th><th style="text-align:right">단가(1일)</th><th style="text-align:right">합계(${days}일)</th></tr></thead>
    <tbody>${rows}</tbody>
  </table>
  <div class="total-box">
    <div class="total-label">공급가액 (VAT 별도)</div>
    <div class="total-price">₩${total.toLocaleString()}</div>
    <div class="vat">VAT 10% 포함 시: ₩${vat.toLocaleString()}</div>
  </div>
  <div class="footer">※ 본 견적은 시장 참고가 기준이며 실제 협의에 따라 조정됩니다. | © BAOSTARS 이영봉 대표</div>

  closeModal();
  const w=window.open('','_blank');

  // 견적 로그 전송 (구글 시트 기록 + 이메일 알림)
  try{

    fetch('https://script.google.com/macros/s/AKfycbwHExLcC-9-w3U_9-gVuaOrUbOKiGw9_rrdtboU1Fg6m27LJzWZoCb2zjeD5sJ-pt1B/exec',{
      method:'POST',
      body:JSON.stringify({
        client:client,
        manager:manager,
        contact:contact,
        project:project,
        period:periodStr,
        equipment:equipList,
        total:'₩'+total.toLocaleString(),
        vat:'₩'+vat.toLocaleString()
      })
    }).catch(()=>{});
  }catch(e){}
}

document.getElementById('modalBg').addEventListener('click',function(e){
  if(e.target===this)closeModal();
});

// 시작
fetchSheetData();
</script>
